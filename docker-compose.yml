services:
  mongodb:
    image: mongo:latest
    container_name: itasset-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - itasset-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    container_name: itasset-backend
    restart: always
    ports:
      - "5000:5000"
    env_file: ./backend/.env
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/gem_itasset
      - NODE_ENV=production
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - itasset-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    container_name: itasset-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"  # Standard HTTPS port
    volumes:
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - itasset-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: itasset-cloudflared
    restart: always
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - itasset-network
    depends_on:
      - frontend

volumes:
  mongodb_data:

networks:
  itasset-network:
    driver: bridge
